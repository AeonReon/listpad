<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ListPad</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ListPad">
    <meta name="theme-color" content="#0a1628">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/ListPad.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0a1628;
            --surface: #111d35;
            --card: #162544;
            --card-hover: #1a2d52;
            --accent: #d4a853;
            --accent-glow: rgba(212, 168, 83, 0.15);
            --accent-dim: #a07d3a;
            --blue: #2a6fc9;
            --blue-dim: #1e4f8f;
            --text: #e8e4dc;
            --text-dim: #6b7a94;
            --border: rgba(212, 168, 83, 0.12);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            padding: calc(20px + var(--safe-top)) 16px calc(100px + var(--safe-bottom)) 16px;
        }

        /* ====== HEADER ====== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), #f0d080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .back-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .back-btn:active { background: var(--card-hover); }
        .back-btn.visible { display: flex; }

        /* ====== INPUT BAR ====== */
        .input-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .input-bar input {
            flex: 1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-bar input::placeholder { color: var(--text-dim); }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), #c4953f);
            border: none;
            border-radius: 14px;
            width: 52px;
            color: var(--bg);
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-add:active { opacity: 0.8; transform: scale(0.95); }

        /* ====== LIST CARDS (Master view) ====== */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            animation: slideIn 0.25s ease-out;
        }

        .list-card:active { background: var(--card); transform: scale(0.98); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }

        .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--card), var(--card-hover));
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .card-info { min-width: 0; }

        .card-name {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-count {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .card-arrow {
            color: var(--text-dim);
            font-size: 18px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .card-delete {
            background: none;
            border: none;
            color: transparent;
            font-size: 20px;
            padding: 8px;
            cursor: pointer;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .list-card:hover .card-delete,
        .list-card:active .card-delete { color: var(--text-dim); }
        .card-delete:active { color: #e05555 !important; }

        /* ====== DETAIL VIEW ====== */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .master-view.hidden { display: none; }

        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--accent);
        }

        /* ====== ITEMS ====== */
        .items { display: flex; flex-direction: column; gap: 8px; }

        .item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.2s;
            animation: slideIn 0.2s ease-out;
        }

        .item.done { opacity: 0.45; }
        .item.done .item-text { text-decoration: line-through; color: var(--text-dim); }

        .item-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--text-dim);
            background: none;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: transparent;
            font-size: 12px;
        }

        .item.done .item-check {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent), #c4953f);
            color: var(--bg);
        }

        .item-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        .item-delete {
            background: none;
            border: none;
            color: transparent;
            font-size: 18px;
            padding: 4px 6px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .item:hover .item-delete,
        .item:active .item-delete { color: var(--text-dim); }
        .item-delete:active { color: #e05555 !important; }

        /* ====== EMPTY STATE ====== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 42px;
            margin-bottom: 14px;
            opacity: 0.4;
        }

        .empty-state p { font-size: 15px; line-height: 1.5; }

        /* ====== CONFIRM DIALOG ====== */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.15s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 300px;
            width: 100%;
            text-align: center;
        }

        .confirm-box p { font-size: 16px; margin-bottom: 20px; line-height: 1.4; }

        .confirm-buttons { display: flex; gap: 10px; }

        .confirm-buttons button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-confirm-delete {
            background: #c0392b;
            color: #fff;
        }

        /* ====== CLEAR ALL ====== */
        .clear-all-bar {
            margin-top: 28px;
            text-align: center;
        }

        .btn-clear-all {
            background: none;
            border: 1px solid rgba(192, 57, 43, 0.3);
            color: #c0392b;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear-all:active { background: #c0392b; color: #fff; }

        /* ====== SUBTLE GOLD LINE ====== */
        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), var(--accent), var(--accent-glow), transparent);
            margin: 4px 0 24px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="header-left">
                <img src="images/ListPad.png" class="app-icon" alt="ListPad">
                <div>
                    <h1>ListPad</h1>
                    <div class="date-label" id="dateLabel"></div>
                </div>
            </div>
            <button class="back-btn" id="backBtn" onclick="goBack()">&#8592; Back</button>
        </header>

        <div class="gold-divider"></div>

        <!-- MASTER VIEW -->
        <div class="master-view" id="masterView">
            <div class="input-bar">
                <input type="text" id="newListInput" placeholder="New list..." autocomplete="off">
                <button class="btn-add" id="addListBtn" onclick="addList()">+</button>
            </div>
            <div class="cards-container" id="cardsContainer"></div>
        </div>

        <!-- DETAIL VIEW -->
        <div class="detail-view" id="detailView">
            <div class="detail-title" id="detailTitle"></div>
            <div class="input-bar">
                <input type="text" id="newItemInput" placeholder="Add item..." autocomplete="off">
                <button class="btn-add" onclick="addItem()">+</button>
            </div>
            <div class="items" id="itemsContainer"></div>
        </div>
    </div>

    <script>
        // State
        let lists = JSON.parse(localStorage.getItem('listpad_lists') || '[]');
        let currentList = null; // index of open list, or null for master

        function save() {
            localStorage.setItem('listpad_lists', JSON.stringify(lists));
        }

        // Date
        document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-GB', {
            weekday: 'long', day: 'numeric', month: 'long'
        });

        // Escape HTML
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // List icons (rotate through a small set)
        const listIcons = ['📋', '📝', '🛒', '✅', '📌', '⭐', '💡', '🎯'];
        function getIcon(index) { return listIcons[index % listIcons.length]; }

        // Enter key listeners
        document.getElementById('newListInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addList();
        });
        document.getElementById('newItemInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addItem();
        });

        // ====== NAVIGATION ======
        function openList(index) {
            currentList = index;
            renderDetail();
            document.getElementById('masterView').classList.add('hidden');
            document.getElementById('detailView').classList.add('active');
            document.getElementById('backBtn').classList.add('visible');
        }

        function goBack() {
            currentList = null;
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('masterView').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('visible');
            renderMaster();
        }

        // ====== MASTER VIEW ======
        function renderMaster() {
            const container = document.getElementById('cardsContainer');

            if (lists.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>No lists yet.<br>Create one above to get started.</p>
                    </div>`;
                return;
            }

            container.innerHTML = lists.map((list, i) => {
                const total = list.items.length;
                const done = list.items.filter(it => it.done).length;
                const countText = total === 0 ? 'Empty' : `${done}/${total} done`;
                return `
                <div class="list-card" onclick="openList(${i})">
                    <div class="card-left">
                        <div class="card-icon">${getIcon(i)}</div>
                        <div class="card-info">
                            <div class="card-name">${esc(list.name)}</div>
                            <div class="card-count">${countText}</div>
                        </div>
                    </div>
                    <button class="card-delete" onclick="event.stopPropagation(); confirmDeleteList(${i})" title="Delete">&times;</button>
                    <span class="card-arrow">&#8250;</span>
                </div>`;
            }).join('') + (lists.length > 1 ? `
                <div class="clear-all-bar">
                    <button class="btn-clear-all" onclick="confirmClearAll()">Clear All Lists</button>
                </div>` : '');
        }

        // ====== DETAIL VIEW ======
        function renderDetail() {
            if (currentList === null) return;
            const list = lists[currentList];
            document.getElementById('detailTitle').textContent = list.name;

            const container = document.getElementById('itemsContainer');
            if (list.items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">✏️</div>
                        <p>No items yet.<br>Add one above.</p>
                    </div>`;
                return;
            }

            container.innerHTML = list.items.map((item, ii) => `
                <div class="item ${item.done ? 'done' : ''}">
                    <button class="item-check" onclick="toggleItem(${ii})">${item.done ? '&#10003;' : ''}</button>
                    <span class="item-text">${esc(item.text)}</span>
                    <button class="item-delete" onclick="deleteItem(${ii})">&times;</button>
                </div>
            `).join('');
        }

        // ====== ACTIONS ======
        function addList() {
            const input = document.getElementById('newListInput');
            const name = input.value.trim();
            if (!name) return;
            lists.unshift({ name, items: [] });
            input.value = '';
            save();
            renderMaster();
        }

        function addItem() {
            if (currentList === null) return;
            const input = document.getElementById('newItemInput');
            const text = input.value.trim();
            if (!text) return;
            lists[currentList].items.push({ text, done: false });
            input.value = '';
            save();
            renderDetail();
            input.focus();
        }

        function toggleItem(ii) {
            lists[currentList].items[ii].done = !lists[currentList].items[ii].done;
            save();
            renderDetail();
        }

        function deleteItem(ii) {
            lists[currentList].items.splice(ii, 1);
            save();
            renderDetail();
        }

        function confirmDeleteList(li) {
            showConfirm(`Delete "${esc(lists[li].name)}"?`, () => {
                lists.splice(li, 1);
                save();
                if (currentList !== null) goBack();
                else renderMaster();
            });
        }

        function confirmClearAll() {
            showConfirm('Delete all lists?', () => {
                lists = [];
                save();
                renderMaster();
            });
        }

        function showConfirm(msg, onYes) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-box">
                    <p>${msg}</p>
                    <div class="confirm-buttons">
                        <button class="btn-cancel">Cancel</button>
                        <button class="btn-confirm-delete">Delete</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            overlay.querySelector('.btn-cancel').onclick = () => overlay.remove();
            overlay.querySelector('.btn-confirm-delete').onclick = () => { overlay.remove(); onYes(); };
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // Init
        renderMaster();
    </script>
</body>
</html>
